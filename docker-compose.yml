# Local development — hot reload, volume mounts, .env file
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: testcase_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d testcase_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7860:7860"
    volumes:
      - .:/app                        # mount source for hot reload
      - /app/venv                     # keep container's venv isolated
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/testcase_db
    command: uvicorn main:app --host 0.0.0.0 --port 7860 --reload
    working_dir: /app/test-case-generator/backend
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
